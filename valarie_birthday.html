<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday Valarie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Fredoka:wght@500;600;700&family=Caveat:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B1620;
    --cream:#FBEFE6;
    --wine:#7A2048;
    --rose:#E8607F;
    --gold:#E8A33D;
    --navy:#050914;
    --pink-particle:#ff4d7d;
    --blue-particle:#5ad1ff;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    width:100%; height:100%;
    overflow-x:hidden;
    background:#000;
    font-family:'Poppins',sans-serif;
    color:var(--ink);
  }
  .scene{
    position:relative;
    width:100%;
    min-height:100vh;
    display:none;
  }
  .scene.active{ display:block; }

  /* ---------- SCENE 1 : pink heart ---------- */
  #scene1{
    background:#050308;
    height:100vh;
    overflow:hidden;
  }
  #scene1.active{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #pinkCanvas{
    position:absolute; top:0; left:0;
    width:100%; height:100%;
  }
  #fromJunior{
    position:relative;
    z-index:2;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(22px, 4vw, 38px);
    color:#ffe3ec;
    text-shadow:0 0 14px rgba(255,77,125,.85), 0 0 30px rgba(255,77,125,.5);
    opacity:0;
    letter-spacing:1px;
    transition:opacity 1.6s ease;
    text-align:center;
    pointer-events:none;
  }
  #fromJunior.show{ opacity:1; }

  /* ---------- SCENE 2 : birthday wish ---------- */
  #scene2{
    background:
      radial-gradient(circle at 15% 10%, rgba(232,163,61,.18), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(122,32,72,.18), transparent 45%),
      var(--cream);
    padding:48px 6vw 100px;
  }
  .bunting{
    display:flex;
    justify-content:center;
    gap:4px;
    margin-bottom:18px;
    flex-wrap:wrap;
  }
  .flag{
    width:0; height:0;
    border-left:13px solid transparent;
    border-right:13px solid transparent;
    border-top:22px solid var(--rose);
    opacity:.85;
  }
  .flag:nth-child(3n+1){ border-top-color:var(--wine); }
  .flag:nth-child(3n+2){ border-top-color:var(--gold); }

  .hero{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6vw;
    flex-wrap:wrap;
    max-width:1100px;
    margin:0 auto;
  }
  .hero-text{ max-width:480px; text-align:left; }
  .eyebrow{
    font-family:'Caveat', cursive;
    font-size:26px;
    color:var(--wine);
    margin-bottom:-6px;
  }
  h1.headline{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:clamp(40px, 7vw, 68px);
    line-height:.98;
    color:var(--ink);
  }
  h1.headline span{
    display:block;
    color:var(--rose);
    -webkit-text-stroke:1.5px var(--wine);
  }
  .name-script{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:clamp(34px,5vw,52px);
    color:var(--wine);
    margin-top:6px;
  }
  .date-pill{
    display:inline-block;
    margin-top:18px;
    padding:8px 18px;
    background:var(--ink);
    color:var(--cream);
    border-radius:999px;
    font-size:14px;
    letter-spacing:.5px;
  }
  .photo-wrap{
    position:relative;
    width:min(58vw, 300px);
    height:min(58vw, 300px);
  }
  .photo-ring{
    position:absolute; inset:-14px;
    border-radius:50%;
    border:2px solid var(--wine);
    opacity:.5;
  }
  .photo-glow{
    position:absolute; inset:-30px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(232,96,127,.35), transparent 70%);
    filter:blur(6px);
    animation:pulseGlow 3.4s ease-in-out infinite;
  }
  @keyframes pulseGlow{
    0%,100%{ transform:scale(1); opacity:.7; }
    50%{ transform:scale(1.06); opacity:1; }
  }
  .photo-circle{
    position:relative;
    width:100%; height:100%;
    border-radius:50%;
    overflow:hidden;
    border:5px solid var(--cream);
    box-shadow:0 12px 34px rgba(43,22,32,.25);
  }
  .photo-circle img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .balloon{
    position:absolute;
    width:34px; height:42px;
    border-radius:50% 50% 50% 50% / 55% 55% 45% 45%;
    animation:bob 4s ease-in-out infinite;
  }
  .balloon::after{
    content:'';
    position:absolute;
    bottom:-26px; left:50%;
    width:1px; height:26px;
    background:rgba(43,22,32,.4);
  }
  .balloon.b1{ background:var(--rose); top:-18px; left:-30px; animation-delay:.2s; }
  .balloon.b2{ background:var(--gold); bottom:10px; right:-34px; animation-delay:1s; width:28px; height:36px; }
  @keyframes bob{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-14px) rotate(3deg); }
  }

  /* ---- letter ---- */
  .letter-section{
    max-width:640px;
    margin:90px auto 0;
    text-align:center;
  }
  .open-btn{
    font-family:'Caveat', cursive;
    font-size:24px;
    font-weight:600;
    background:var(--wine);
    color:var(--cream);
    border:none;
    padding:14px 36px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(122,32,72,.3);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .open-btn:hover{ transform:translateY(-2px); box-shadow:0 14px 30px rgba(122,32,72,.4); }

  .envelope{
    margin:34px auto 0;
    max-width:600px;
    text-align:left;
    background:#fff;
    border:1px solid rgba(122,32,72,.15);
    border-radius:18px;
    padding:38px 38px 30px;
    box-shadow:0 18px 50px rgba(43,22,32,.12);
    opacity:0;
    transform:translateY(16px);
    transition:opacity .8s ease, transform .8s ease;
  }
  .envelope.show{ opacity:1; transform:translateY(0); }
  .letter-greeting{
    font-family:'Caveat', cursive;
    font-size:32px;
    color:var(--wine);
    margin-bottom:14px;
  }
  .letter-body p{
    font-family:'Poppins', sans-serif;
    font-weight:300;
    font-size:16px;
    line-height:1.85;
    color:var(--ink);
    margin-bottom:16px;
  }
  .letter-sign{
    font-family:'Caveat', cursive;
    font-size:28px;
    color:var(--wine);
    text-align:right;
    margin-top:10px;
  }

  .continue-section{
    text-align:center;
    margin-top:64px;
  }
  .continue-btn{
    font-family:'Poppins', sans-serif;
    font-size:14px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    background:transparent;
    color:var(--wine);
    border:1.5px solid var(--wine);
    padding:13px 30px;
    border-radius:999px;
    cursor:pointer;
    opacity:0;
    transition:opacity .8s ease, background .25s ease, color .25s ease;
  }
  .continue-btn.show{ opacity:1; }
  .continue-btn:hover{ background:var(--wine); color:var(--cream); }

  /* ---------- SCENE 3 : finale ---------- */
  #scene3{
    background:var(--navy);
    height:100vh;
    overflow:hidden;
  }
  #scene3.active{
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #blueCanvas{
    position:absolute; top:0; left:0;
    width:100%; height:100%;
  }
  .finale-text{
    position:absolute;
    top:9%;
    left:50%;
    transform:translateX(-50%);
    z-index:2;
    text-align:center;
    pointer-events:none;
    width:90%;
  }
  #iloveyou{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(28px, 5.5vw, 50px);
    color:#eaffff;
    text-shadow:0 0 16px rgba(90,209,255,.9), 0 0 36px rgba(90,209,255,.55);
    opacity:0;
    transition:opacity 1.6s ease;
    margin-bottom:18px;
  }
  #iloveyou.show{ opacity:1; }
  .signature{
    font-family:'Caveat', cursive;
    font-size:clamp(18px,2.6vw,24px);
    color:#cfeeff;
    opacity:0;
    transition:opacity 1.6s ease;
    line-height:1.6;
  }
  .signature.show{ opacity:1; }

  .skip{
    position:fixed;
    bottom:18px; right:22px;
    z-index:5;
    font-size:12px;
    color:rgba(255,255,255,.45);
    background:none;
    border:none;
    cursor:pointer;
    letter-spacing:.5px;
  }
  #scene2 .skip, #scene2 ~ .skip{ color:rgba(43,22,32,.35); }
</style>
</head>

<script>
/* ======================================================
   SHARED HELPERS
====================================================== */
function heartXY(t){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return [x,y];
}
function buildOutlinePoints(n){
  const fineN = n*6;
  const raw = [];
  for(let i=0;i<=fineN;i++){
    raw.push(heartXY(2*Math.PI*i/fineN));
  }
  const cum = [0];
  for(let i=1;i<raw.length;i++){
    const dx = raw[i][0]-raw[i-1][0];
    const dy = raw[i][1]-raw[i-1][1];
    cum.push(cum[i-1] + Math.hypot(dx,dy));
  }
  const total = cum[cum.length-1];
  const pts = [];
  let j = 0;
  const step = total/n;
  for(let k=0;k<n;k++){
    const d = k*step;
    while(j < cum.length-2 && cum[j+1] < d) j++;
    pts.push(raw[j]);
  }
  return pts;
}
function easePower2InOut(t){
  if(t<0.5) return 4*t*t*t;
  const f = -2*t+2;
  return 1 - (f*f*f)/2;
}
function resizeCanvas(canvas){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width*dpr;
  canvas.height = rect.height*dpr;
  canvas.style.width = rect.width+'px';
  canvas.style.height = rect.height+'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {w:rect.width, h:rect.height};
}

/* ======================================================
   SCENE 1 : PINK HEART TRACE-IN
====================================================== */
(function(){
  const canvas = document.getElementById('pinkCanvas');
  const ctx = canvas.getContext('2d');
  let dims = resizeCanvas(canvas);
  window.addEventListener('resize', ()=>{ dims = resizeCanvas(canvas); });

  const N = 1500;
  const STAGGER = 0.062;        // frames between consecutive particle starts
  const MIN_DUR = 55, MAX_DUR = 150;
  const JITTER = 10;

  function buildParticles(){
    const scale = Math.min(dims.w, dims.h)/30;
    const originX = dims.w/2, originY = dims.h/2 + dims.h*0.02;
    const pts = buildOutlinePoints(N);
    return pts.map((p,i)=>{
      const tx = originX + p[0]*scale + (Math.random()*2-1)*JITTER;
      const ty = originY - p[1]*scale + (Math.random()*2-1)*JITTER;
      return {
        ox:originX, oy:originY,
        tx, ty,
        delay: i*STAGGER,
        duration: MIN_DUR + Math.random()*(MAX_DUR-MIN_DUR),
        size: 1.1 + Math.random()*1.8,
        hue: 335 + Math.random()*15,
        x:originX, y:originY
      };
    });
  }

  let particles = buildParticles();
  let frame = 0;
  const totalTrace = N*STAGGER + MAX_DUR;
  let textShown = false;

  function step(){
    frame += 1;
    ctx.fillStyle = 'rgba(5,3,8,0.18)';
    ctx.fillRect(0,0,dims.w,dims.h);

    ctx.globalCompositeOperation = 'lighter';
    for(const p of particles){
      if(frame < p.delay) continue;
      const local = frame - p.delay;
      let prog = local/p.duration;
      if(prog>1) prog=1;
      const e = easePower2InOut(prog);
      p.x = p.ox + (p.tx-p.ox)*e;
      p.y = p.oy + (p.ty-p.oy)*e;
      ctx.beginPath();
      ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, 0.9)`;
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    if(!textShown && frame > totalTrace*0.92){
      textShown = true;
      document.getElementById('fromJunior').classList.add('show');
      setTimeout(()=>{ window.goToScene(2); }, 3200);
    }
    if(frame < totalTrace + 260){
      requestAnimationFrame(step);
    }
  }
  // expose a starter so we only run while scene1 is active
  window.__startScene1 = function(){
    frame = 0; textShown = false;
    particles = buildParticles();
    document.getElementById('fromJunior').classList.remove('show');
    requestAnimationFrame(step);
  };
})();

/* ======================================================
   SCENE 3 : BLUE HEART FOUNTAIN
====================================================== */
(function(){
  const canvas = document.getElementById('blueCanvas');
  const ctx = canvas.getContext('2d');
  let dims = {w:0,h:0};

  function makeTargets(n){
    // filled heart cloud: random points biased toward outline + interior
    const pts = [];
    for(let i=0;i<n;i++){
      const t = Math.random()*Math.PI*2;
      const [hx,hy] = heartXY(t);
      const r = Math.pow(Math.random(), 0.55); // bias toward edge but fill inward
      pts.push([hx*r, hy*r]);
    }
    return pts;
  }

  const N = 1100;
  let particles = [];
  let frame = 0;
  let spawned = 0;
  const SPAWN_OVER = 260; // frames over which particles are introduced
  let textShown = false;
  let running = false;

  function buildParticles(){
    dims = resizeCanvas(canvas);
    const minDim = Math.min(dims.w, dims.h);
    const scale = (minDim*0.34) / 28.92;             // heart ~34% of viewport
    const heartCenterY = dims.h*0.60;
    const baseY = heartCenterY + 17*scale + minDim*0.07;
    const originX = dims.w/2;
    const targets = makeTargets(N);
    return targets.map((p,i)=>{
      const tx = dims.w/2 + p[0]*scale;
      const ty = heartCenterY - p[1]*scale;
      const baseX = originX + (Math.random()*2-1)*minDim*0.10;
      return {
        ox: baseX, oy: baseY,
        tx, ty,
        spawnAt: Math.random()*SPAWN_OVER,
        duration: 110 + Math.random()*130,
        size: 0.8 + Math.random()*1.8,
        sway: (Math.random()*2-1)*14,
        twinklePhase: Math.random()*Math.PI*2,
        x: baseX, y: baseY,
        started:false
      };
    });
  }

  function drawBase(dims2){
    const minDim = Math.min(dims.w, dims.h);
    const cx = dims.w/2, cy = dims.h*0.60 + 17*((minDim*0.34)/28.92) + minDim*0.07;
    const w = minDim*0.17, h = minDim*0.024;
    const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,w);
    grad.addColorStop(0,'rgba(120,220,255,0.45)');
    grad.addColorStop(1,'rgba(120,220,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx,cy,w,h,0,0,Math.PI*2);
    ctx.fill();
  }

  function step(){
    if(!running) return;
    frame += 1;
    ctx.fillStyle = 'rgba(5,9,20,0.16)';
    ctx.fillRect(0,0,dims.w,dims.h);

    drawBase();

    ctx.globalCompositeOperation = 'lighter';
    let allDone = true;
    for(const p of particles){
      if(frame < p.spawnAt){ allDone=false; continue; }
      const local = frame - p.spawnAt;
      let prog = local/p.duration;
      if(prog<1) allDone=false;
      if(prog>1) prog=1;
      const e = easePower2InOut(prog);
      const swayAmt = Math.sin(prog*Math.PI)*p.sway;
      p.x = p.ox + (p.tx-p.ox)*e + swayAmt*(1-e);
      p.y = p.oy + (p.ty-p.oy)*e;
      const twinkle = 0.6 + 0.4*Math.sin(frame*0.05 + p.twinklePhase);
      ctx.beginPath();
      ctx.fillStyle = `rgba(150,225,255,${0.75*twinkle})`;
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    if(!textShown && frame > SPAWN_OVER + 150){
      textShown = true;
      document.getElementById('iloveyou').classList.add('show');
      setTimeout(()=>{ document.getElementById('signature').classList.add('show'); }, 1000);
    }
    requestAnimationFrame(step);
  }

  window.__startScene3 = function(){
    frame = 0; textShown = false; running = true;
    document.getElementById('iloveyou').classList.remove('show');
    document.getElementById('signature').classList.remove('show');
    particles = buildParticles();
    requestAnimationFrame(step);
  };
})();

function buildLetter(){
  const container = document.getElementById('letterBody');
  container.innerHTML = LETTER_TEXT.map(p=>`<p>${p}</p>`).join('');
}
buildLetter();

document.getElementById('openLetterBtn').addEventListener('click', function(){
  this.style.display='none';
  const env = document.getElementById('envelope');
  env.classList.add('show');
  setTimeout(()=>{
    document.getElementById('continueBtn').classList.add('show');
  }, 900);
});

document.getElementById('continueBtn').addEventListener('click', function(){
  window.goToScene(3);
});

window.goToScene = function(n){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById('scene'+n).classList.add('active');
  if(n===3){ window.__startScene3(); }
};
